# Render.com deployment configuration
# Connect your GitHub repo and this will auto-deploy.
#
# All `sync: false` entries are managed in Render's dashboard — never
# committed. Set these before the first deploy; the server hard-fails on
# missing JWT_SECRET / GOOGLE_CLIENT_ID in production.
services:
  - type: web
    name: devtools-pro-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

      # Supabase — must be the SERVICE_ROLE key (not anon) since RLS is now restrictive.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

      # Auth secrets — required in production
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

      # Admin console
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optional: legacy fallback password if ADMIN_PASSWORD is unset
      - key: ADMIN_KEY
        sync: false

      # Meet link pool
      - key: MEET_LINK_1
        sync: false
      - key: MEET_LINK_2
        sync: false
      - key: MEET_LINK_3
        sync: false

      - key: WHATSAPP_NUMBER
        value: "919019879108"

      # Comma-separated list of allowed frontend origins.
      - key: FRONTEND_URL
        sync: false

      # ─── Slack Notifications (optional) ───
      # Per-channel incoming webhook URLs. Any URL left blank silently
      # skips that channel, so it's safe to deploy without these — you
      # can add them later via the Render dashboard without a code change.
      # See backend/.env.example for the full routing table.
      - key: SLACK_WEBHOOK_ALL
        sync: false
      - key: SLACK_WEBHOOK_REGISTRATION
        sync: false
      - key: SLACK_WEBHOOK_RENEW
        sync: false
      - key: SLACK_WEBHOOK_CHANGE
        sync: false
      - key: SLACK_WEBHOOK_CANCEL
        sync: false
      - key: SLACK_WEBHOOK_EXPIRY
        sync: false
      - key: SLACK_WEBHOOK_PAYMENTS_PENDING
        sync: false
      - key: SLACK_WEBHOOK_PAYMENTS_VERIFIED
        sync: false
      - key: SLACK_WEBHOOK_ADMIN
        sync: false
      - key: SLACK_WEBHOOK_REVIEWS
        sync: false
      - key: SLACK_WEBHOOK_VIP
        sync: false

      # Admin URL referenced from Slack action buttons. Honours ?uid=<id>
      # so the button drops you onto the user's row.
      - key: ADMIN_URL
        value: "https://devtools-proai.github.io/devtoolspro/admin.html"
